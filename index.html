<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A minimal hello world page for the Pantheon bot dev playground.">
    <title>Hello World</title>
    <style>
      :root {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1f2933;
        background-color: #f7f9fc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        padding: 3rem;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 2.5rem;
      }

      p {
        margin: 0;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Welcome to the Pantheon bot developer playground.</p>
    </main>
  </body>
</html>
