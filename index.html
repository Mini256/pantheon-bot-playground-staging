<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-start: #f5f7fa;
        --bg-end: #c3cfe2;
        --text-color: #1f2933;
        --panel-color: rgba(255, 255, 255, 0.9);
        --accent-color: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", "Helvetica Neue", system-ui, -apple-system,
          BlinkMacSystemFont, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: var(--text-color);
        background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      }

      main {
        width: min(90vw, 480px);
        padding: clamp(1.5rem, 4vw, 3rem);
        text-align: center;
        background: var(--panel-color);
        border-radius: 1.25rem;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2.5rem, 8vw, 3.5rem);
        letter-spacing: 0.05em;
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 3.5vw, 1.2rem);
        color: rgba(31, 41, 55, 0.85);
      }

      footer {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: rgba(55, 65, 81, 0.8);
      }

      .pulse {
        display: inline-block;
        width: 0.8rem;
        height: 0.8rem;
        margin-right: 0.4rem;
        border-radius: 999px;
        background: var(--accent-color);
        box-shadow: 0 0 0 rgba(37, 99, 235, 0.7);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(37, 99, 235, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>A minimal, responsive greeting built for issue #31.</p>
      <footer><span class="pulse" aria-hidden="true"></span>Ready on any device</footer>
    </main>
  </body>
</html>
