<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World | Pantheon Issue 26</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        --bg-start: #f9fafb;
        --bg-end: #dbeafe;
        --card-bg: rgba(255, 255, 255, 0.95);
        --text-color: #0f172a;
        --muted-color: #475569;
        --accent: #6366f1;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg-start: #0f172a;
          --bg-end: #1e293b;
          --card-bg: rgba(15, 23, 42, 0.85);
          --text-color: #f8fafc;
          --muted-color: #cbd5f5;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(1.5rem, 4vw, 4rem);
        background: radial-gradient(circle at top, var(--bg-start), var(--bg-end));
      }

      main {
        width: min(32rem, 100%);
        padding: clamp(2rem, 5vw, 3.5rem);
        background: var(--card-bg);
        border-radius: 1.75rem;
        box-shadow: 0 1.5rem 3rem rgba(15, 23, 42, 0.2);
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px solid rgba(99, 102, 241, 0.2);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 6vw, 3.5rem);
        font-weight: 700;
        color: var(--text-color);
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 3vw, 1.25rem);
        color: var(--muted-color);
        line-height: 1.5;
      }

      .pill {
        align-self: center;
        padding: 0.4rem 1.25rem;
        border-radius: 999px;
        font-size: 0.875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(99, 102, 241, 0.1);
        color: var(--accent);
        border: 1px solid rgba(99, 102, 241, 0.3);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="pill">Issue #26</span>
      <h1>Hello World</h1>
      <p>This lightweight page confirms the project wiring for the Pantheon hello-world task and stays readable on any screen.</p>
    </main>
  </body>
</html>
