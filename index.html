<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal Hello World page for the pantheon bot dev playground."
    />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        --brand-bg: radial-gradient(circle at top, #f9fafb, #d0def2);
        --card-bg: rgba(255, 255, 255, 0.9);
        --text-color: #0f172a;
        --text-dark-color: #e2e8f0;
        --accent: #2563eb;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--brand-bg);
        font-family: inherit;
        color: var(--text-color);
        padding: 1.5rem;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0b1120;
          color: var(--text-dark-color);
        }
      }

      main {
        background: var(--card-bg);
        border-radius: 1.5rem;
        max-width: 28rem;
        width: 100%;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(15, 23, 42, 0.25);
        text-align: center;
        transition: transform 200ms ease, box-shadow 200ms ease;
      }

      main:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 70px rgba(15, 23, 42, 0.35);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 0.75rem;
        margin-bottom: 0.75rem;
        opacity: 0.7;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 1.5rem;
        font-size: 1rem;
        color: #475569;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #94a3b8;
        }
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        text-decoration: none;
        transition: background 150ms ease, transform 150ms ease;
      }

      .cta:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }

      .cta:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      footer {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        color: #94a3b8;
      }

      @media (max-width: 480px) {
        main {
          padding: 2rem 1.5rem;
        }

        p {
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Welcome</p>
      <h1 id="hello">Hello World</h1>
      <p>
        This friendly greeting is rendered with responsive, accessible design so it looks crisp on
        any device.
      </p>
      <a class="cta" href="#hello" aria-label="Say hello to the world">
        Say Hello
      </a>
      <footer>Built with care for the Pantheon bot dev playground.</footer>
    </main>
  </body>
</html>
