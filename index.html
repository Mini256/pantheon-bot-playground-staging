<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal Hello World page implemented for GitHub issue #26"
    />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-start: #f8fafc;
        --bg-end: #dbeafe;
        --card-bg: rgba(255, 255, 255, 0.9);
        --text-color: #0f172a;
        --accent: #2563eb;
        --accent-soft: #93c5fd;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, var(--bg-end), var(--bg-start));
        color: var(--text-color);
      }

      .card {
        width: min(560px, 100%);
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border-radius: 1.5rem;
        padding: 2.5rem;
        box-shadow: 0 25px 50px rgba(15, 23, 42, 0.15);
        text-align: center;
      }

      .eyebrow {
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-size: 0.85rem;
        color: var(--accent);
        margin-bottom: 1rem;
      }

      h1 {
        font-size: clamp(2.75rem, 8vw, 3.5rem);
        margin: 0;
        color: var(--text-color);
      }

      .lead {
        margin: 1rem auto 2rem;
        max-width: 46ch;
        font-size: 1.1rem;
        line-height: 1.55;
        color: rgba(15, 23, 42, 0.8);
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.85rem 1.75rem;
        border-radius: 999px;
        border: none;
        color: #fff;
        background: linear-gradient(120deg, var(--accent), #1d4ed8);
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      .cta:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 3px;
      }

      .cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(37, 99, 235, 0.35);
      }

      footer {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: rgba(15, 23, 42, 0.65);
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="hero-title">
      <p class="eyebrow">Issue #26</p>
      <h1 id="hero-title">Hello World</h1>
      <p class="lead">
        This lightweight page demonstrates a clean and accessible implementation of
        the classic "Hello World" greeting for the pantheon-bot dev playground.
      </p>
      <button class="cta" type="button" aria-label="Celebrate Hello World">
        Celebrate!
      </button>
      <footer>Crafted with standards-compliant HTML5 & CSS.</footer>
    </main>
  </body>
</html>
