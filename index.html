<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Simple hello world page for the Pantheon bot dev playground.">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background-color: #f2f4f8;
      color: #1d1d1f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    }

    main {
      text-align: center;
      padding: 3rem;
      border-radius: 1rem;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 0.5rem;
      font-size: clamp(2.5rem, 4vw, 3.5rem);
      letter-spacing: 0.05em;
      color: #2c3e50;
    }

    p {
      margin-top: 0;
      font-size: 1.125rem;
      color: #4a4a4f;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello World</h1>
    <p>Welcome to the Pantheon bot dev playground.</p>
  </main>
</body>
</html>
