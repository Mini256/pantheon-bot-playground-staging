<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #fef9f4, #d8e6ff);
        color: #243b53;
        text-align: center;
      }

      main {
        padding: 2rem 3rem;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.15);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 6vw, 3.5rem);
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Welcome to the simplest page in the pantheon.</p>
    </main>
  </body>
</html>
