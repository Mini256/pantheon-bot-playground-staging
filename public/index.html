<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple, polished Hello World page for Pantheon playground experiments." />
    <title>Hello World | Pantheon Playground</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: radial-gradient(circle at top, #eef2ff, #f8fafc 45%, #f1f5f9 100%);
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      main {
        width: 100%;
        max-width: 520px;
      }

      .hero-card {
        background: #ffffff;
        border-radius: 1.5rem;
        padding: 3rem;
        box-shadow: 0 25px 45px rgba(15, 23, 42, 0.15);
        text-align: center;
        border: 1px solid rgba(99, 102, 241, 0.15);
      }

      .hero-card h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 4vw, 3rem);
        letter-spacing: -0.05em;
      }

      .hero-card p {
        margin: 0 auto 2rem;
        color: #475569;
        max-width: 36ch;
        line-height: 1.6;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.85rem 1.5rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        background: linear-gradient(120deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 15px 30px rgba(99, 102, 241, 0.35);
      }

      footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #94a3b8;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero-card">
        <h1>Hello World</h1>
        <p>
          Welcome to the Pantheon bot development playground. This minimal launchpad keeps the experience focused while
          looking crisp and modern.
        </p>
        <a class="cta" href="#start" aria-label="Begin exploring the playground">Get Started</a>
        <footer>Mini256 · Pantheon Playground</footer>
      </section>
    </main>
  </body>
</html>
